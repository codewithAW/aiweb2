<!DOCTYPE html>
<html>
<head>
    <title>Garments Company</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Elite Garments</h1>
    <p>Men | Women | Kids Fashion Store</p>
</header>

<section>

<h2>Products List</h2>

<table>
    <tr>
        <th>Category</th>
        <th>Item</th>
        <th>Price</th>
    </tr>

    <tr>
        <td>Men</td>
        <td>Shirt</td>
        <td>2500 PKR</td>
    </tr>

    <tr>
        <td>Women</td>
        <td>Dress</td>
        <td>6000 PKR</td>
    </tr>

    <tr>
        <td>Kids</td>
        <td>Suit</td>
        <td>3000 PKR</td>
    </tr>
</table>

</section>

<section>

<h2>Contact / Query Form</h2>

<form>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">

    <select>
        <option>Men</option>
        <option>Women</option>
        <option>Kids</option>
    </select>

    <textarea placeholder="Your Query"></textarea>

    <button>Submit</button>
</form>

</section>

<footer>
    <p>© Elite Garments 2026</p>
</footer>

</body>
</html>
